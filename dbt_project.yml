name: "snowflake_repo"
version: "1.0"
config-version: 2

profile: "snowflake_repo"

model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
seed-paths: ["data"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_modules"]

models:
  snowflake_repo:
    +schema: "PUBLIC"
    staging:
      +schema: "STAGING"
      +materialized: view
    intermediate:
      +schema: "INTERMEDIATE"
      +materialized: view
    marts:
      +schema: "MARTS"
      +materialized: table
